<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakter — WebTest</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      background-attachment: fixed;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #818cf8, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p { color: #94a3b8; margin-top: 0.5rem; font-size: 0.95rem; }

    nav { margin-top: 0.8rem; }
    nav a {
      color: #a78bfa;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s, text-shadow 0.2s;
    }
    nav a:hover {
      color: #c4b5fd;
      text-shadow: 0 0 12px rgba(167,139,250,0.4);
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      padding: 1.8rem;
      max-width: 900px;
      margin: 0 auto 1.5rem;
      overflow-x: auto;
      transition: border-color 0.3s;
    }

    .card:hover {
      border-color: rgba(139,92,246,0.3);
    }

    .card h2 {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th, td {
      text-align: left;
      padding: 0.7rem 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    th {
      font-weight: 600;
      color: #94a3b8;
      background: rgba(255,255,255,0.08);
      position: sticky;
      top: 0;
    }

    tr:hover td {
      background: rgba(139,92,246,0.06);
    }

    #loading { text-align: center; color: #64748b; padding: 2rem; }
    #error { text-align: center; color: #f87171; padding: 1rem; display: none; }
    #empty { text-align: center; color: #64748b; padding: 2rem; display: none; }
  </style>
</head>
<body>

  <header>
    <h1>Alle kontakter</h1>
    <p>Kontakter lagret i Supabase</p>
    <nav>
      <a href="index.html">&larr; Tilbake til skjema</a>
    </nav>
  </header>

  <div class="card">
    <h2>Kontaktliste</h2>
    <div id="loading">Laster kontakter...</div>
    <div id="error"></div>
    <div id="empty">Ingen kontakter funnet.</div>
    <table id="contacts-table" style="display:none;">
      <thead>
        <tr>
          <th>Navn</th>
          <th>E-post</th>
          <th>By</th>
          <th>Land</th>
          <th>Interesser</th>
          <th>Opprettet</th>
        </tr>
      </thead>
      <tbody id="contacts-body"></tbody>
    </table>
  </div>

  <script>
    const sb = window.supabase.createClient(
      'https://bpnjioorcjqvntxkpuia.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJwbmppb29yY2pxdm50eGtwdWlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjMyODMsImV4cCI6MjA4OTY5OTI4M30.Wc3ZUXK1xIB_9_kCPyEesmCM7mjLLTOZYgAv2yqro04'
    );

    const countryMap = { no: 'Norge', se: 'Sverige', dk: 'Danmark', fi: 'Finland', other: 'Annet' };

    async function loadContacts() {
      const { data, error } = await sb
        .from('contacts')
        .select('*')
        .order('created_at', { ascending: false });

      document.getElementById('loading').style.display = 'none';

      if (error) {
        const errEl = document.getElementById('error');
        errEl.textContent = 'Feil: ' + error.message;
        errEl.style.display = 'block';
        return;
      }

      if (!data || data.length === 0) {
        document.getElementById('empty').style.display = 'block';
        return;
      }

      const tbody = document.getElementById('contacts-body');
      for (const c of data) {
        const tr = document.createElement('tr');
        const date = new Date(c.created_at).toLocaleString('no-NO', {
          day: '2-digit', month: '2-digit', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
        tr.innerHTML =
          '<td>' + esc(c.name) + '</td>' +
          '<td>' + esc(c.email) + '</td>' +
          '<td>' + esc(c.city || '—') + '</td>' +
          '<td>' + esc(countryMap[c.country] || c.country || '—') + '</td>' +
          '<td>' + esc(c.interests ? c.interests.join(', ') : '—') + '</td>' +
          '<td>' + esc(date) + '</td>';
        tbody.appendChild(tr);
      }
      document.getElementById('contacts-table').style.display = 'table';
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    loadContacts();
  </script>

</body>
</html>
